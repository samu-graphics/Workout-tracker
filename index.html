<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>Workout Tracker</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,0..200" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,400;0,600;0,700;1,400&display=swap" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
  <style>
    :root {
      --primary: #1a1a1a;
      --accent: #e65100;
      --accent-light: #fff3e0;
      --accent-dark: #bf360c;
      --bg: #ffffff;
      --bg-secondary: #fafafa;
      --border: #e0e0e0;
      --border-light: #f0f0f0;
      --text: #1a1a1a;
      --text-secondary: #767676;
      --card-bg: #f7f7f7;
      --radius: 6px;
      --radius-sm: 4px;
      --shadow: 0 1px 2px rgba(0,0,0,0.06);
      --shadow-hover: 0 4px 12px rgba(0,0,0,0.1);
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    :root.dark, [data-theme="dark"] {
      --primary: #e0e0e0;
      --accent: #ff6d00;
      --accent-light: #2a1a0a;
      --accent-dark: #ff3d00;
      --bg: #121212;
      --bg-secondary: #1e1e1e;
      --border: #333;
      --border-light: #2a2a2a;
      --text: #e0e0e0;
      --text-secondary: #999;
      --card-bg: #1e1e1e;
      --ok-color: #4caf50;
      --text-inverse: #fff;
      --range-bg: rgba(255,109,0,0.15);
      --shadow: 0 1px 2px rgba(0,0,0,0.2);
      --shadow-hover: 0 4px 12px rgba(0,0,0,0.4);
    }
    :root { --ok-color: #2e7d32; --text-inverse: #fff; --range-bg: rgba(230,81,0,0.12); }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 100, 'GRAD' 0, 'opsz' 24;
      font-size: 20px;
      line-height: 1;
      vertical-align: middle;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 16px; line-height: 1.5; color: var(--text); background: var(--bg); -webkit-font-smoothing: antialiased; }

    .app { height: 100%; display: flex; flex-direction: column; }
    .view { display: none; flex: 1; overflow-y: auto; overflow-x: hidden; padding: 20px; padding-bottom: 80px; }
    .view.active { display: block; animation: fadeIn 0.2s ease; }
    .view-full { display: none; flex: 1; overflow-y: auto; overflow-x: hidden; padding: 20px; }
    .view-full.active { display: block; animation: fadeIn 0.2s ease; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes checkPop { 0% { transform: scale(0.8); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }

    .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: var(--bg); border-top: 1px solid var(--border); z-index: 100; padding-bottom: env(safe-area-inset-bottom, 0); }
    .tab-bar.hidden { display: none; }
    .tab-item { flex: 1; padding: 12px 0 10px; text-align: center; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); cursor: pointer; position: relative; transition: color var(--transition); }
    .tab-item .material-symbols-outlined { font-size: 22px; display: block; margin: 0 auto 2px; }
    .tab-item::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%) scaleX(0); width: 32px; height: 3px; background: var(--accent); border-radius: 2px; transition: transform var(--transition); }
    .tab-item.active { color: var(--primary); font-weight: 700; }
    .tab-item.active::after { transform: translateX(-50%) scaleX(1); }
    @media (hover: hover) {
      .tab-item:hover { color: var(--accent); }
    }

    h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 16px; font-family: 'IBM Plex Serif', serif; }
    h2 { font-size: 18px; font-weight: 700; margin-bottom: 12px; font-family: 'IBM Plex Serif', serif; }
    h3 { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); margin-bottom: 8px; }
    .muted { color: var(--text-secondary); font-size: 13px; }

    .btn { display: inline-flex; align-items: center; justify-content: center; padding: 12px 24px; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; border: 1px solid var(--primary); background: transparent; color: var(--text); cursor: pointer; -webkit-appearance: none; border-radius: var(--radius); transition: all var(--transition); }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: var(--text-inverse); border-color: var(--accent); }
    .btn-ghost { border: none; background: transparent; color: var(--text-secondary); padding: 8px 12px; }
    .btn-danger { color: var(--accent-dark); border-color: var(--accent-dark); }
    @media (hover: hover) {
      .btn:hover { background: var(--primary); color: var(--text-inverse); transform: translateY(-1px); box-shadow: var(--shadow); }
      .btn-primary:hover { background: var(--accent-dark); border-color: var(--accent-dark); box-shadow: 0 2px 8px rgba(230,81,0,0.3); }
      .btn-ghost:hover { background: var(--bg-secondary); color: var(--accent); transform: none; box-shadow: none; }
      .btn-danger:hover { background: var(--accent-dark); color: var(--text-inverse); }
    }
    .btn-sm { padding: 6px 12px; font-size: 11px; }
    .btn-block { width: 100%; }
    .btn:disabled { opacity: 0.3; pointer-events: none; }

    .card { border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; transition: all var(--transition); background: var(--bg); position: relative; }
    .card-highlight { border-color: var(--accent); }
    .card-clickable { cursor: pointer; }
    @media (hover: hover) {
      .card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
    }

    .divider { height: 1px; background: var(--border); margin: 20px 0; }

    input, select { font-family: inherit; font-size: 16px; border: none; border-bottom: 1.5px solid var(--border); padding: 8px 0; width: 100%; background: transparent; color: var(--text); outline: none; text-align: center; transition: border-color var(--transition); border-radius: 0; }
    input:disabled, select:disabled { color: var(--text-secondary); opacity: 0.5; }
    input:focus { border-bottom-color: var(--accent); }
    @media (hover: hover) {
      input:hover, select:hover { border-bottom-color: #bbb; }
    }

    .set-grid { display: grid; grid-template-columns: 40px 1fr 1fr 1fr 36px; gap: 4px; align-items: center; margin-bottom: 4px; }
    .set-grid.header { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); }
    .set-grid .set-cell { text-align: center; font-size: 14px; padding: 8px 4px; }
    .set-grid .set-check { width: 28px; height: 28px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; cursor: pointer; margin: 0 auto; transition: all var(--transition); background: var(--bg); }
    .set-grid .set-check:active { transform: scale(0.92); }
    .set-grid .set-check.done { background: var(--accent); border-color: var(--accent); color: var(--text-inverse); animation: checkPop 0.3s ease; }
    @media (hover: hover) {
      .set-grid .set-check:hover { border-color: var(--accent); transform: scale(1.1); }
    }

    .timer { display: flex; align-items: center; gap: 8px; font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .timer-bar { flex: 1; height: 2px; background: var(--border); overflow: hidden; }
    .timer-bar-fill { height: 100%; background: var(--accent); width: 0%; transition: width 1s linear; }

    .exercise-item { padding: 12px 0; border-bottom: 1px solid var(--border-light); }
    .exercise-item.current { background: var(--bg-secondary); margin: 0 -20px; padding: 12px 20px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .exercise-name { font-size: 16px; font-weight: 700; font-family: 'IBM Plex Serif', serif; }
    .exercise-meta { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

    .chart-bar { height: 24px; background: var(--accent); margin-bottom: 4px; min-width: 4px; border-radius: 2px; }

    .workout-sticky { position: sticky; top: 0; background: var(--bg); z-index: 10; margin: -20px -20px 12px; padding: 20px 20px 0; }
    .workout-scroll { }

    @media (min-width: 600px) {
      .app { max-width: 480px; margin: 0 auto; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
    }

    .flex { display: flex; }
    .flex-1 { flex: 1; }
    .gap-4 { gap: 4px; }
    .gap-8 { gap: 8px; }
    .gap-12 { gap: 12px; }
    .gap-16 { gap: 16px; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .text-center { text-align: center; }
    .p-0 { padding: 0; }
    .mt-4 { margin-top: 4px; }
    .mt-8 { margin-top: 8px; }
    .mt-12 { margin-top: 12px; }
    .mt-16 { margin-top: 16px; }
    .mt-20 { margin-top: 20px; }
    .mt-24 { margin-top: 24px; }
    .mb-4 { margin-bottom: 4px; }
    .mb-8 { margin-bottom: 8px; }
    .mb-12 { margin-bottom: 12px; }
    .mb-16 { margin-bottom: 16px; }
    .mb-20 { margin-bottom: 20px; }
    .op-50 { opacity: 0.5; }
    .op-30 { opacity: 0.3; }

    .exercise-block { padding: 16px; margin-bottom: 12px; border: 1px solid var(--border); border-radius: var(--radius); transition: all var(--transition); animation: slideUp 0.3s ease both; }
    .exercise-block.current { border-color: var(--accent); border-left: 3px solid var(--accent); background: var(--accent-light); }
    .exercise-block.current .exercise-name { color: var(--accent); }

    .rest-timer { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; margin-bottom: 8px; }
    .rest-timer .timer-bar { flex: 1; height: 2px; background: var(--border); }
    .rest-timer .timer-bar-fill { height: 100%; background: var(--accent); width: 0%; transition: width 1s linear; }
    .rest-timer.pulse { animation: pulse 1s ease infinite; }

    .workout-progress { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; font-size: 12px; }
    .workout-progress .bar { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .workout-progress .bar-fill { height: 100%; background: var(--accent); transition: width 0.4s ease; border-radius: 2px; }

    .workout-pill { position: fixed; bottom: 56px; left: 50%; transform: translateX(-50%) translateY(0); background: var(--primary); color: var(--bg); padding: 10px 20px; border-radius: 24px; font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 8px; z-index: 200; cursor: pointer; box-shadow: 0 2px 12px rgba(0,0,0,0.15); white-space: nowrap; transition: all var(--transition); animation: slideUp 0.3s ease; }
    .workout-pill.hidden { display: none; }
    .workout-pill:active { transform: translateX(-50%) scale(0.97); }
    @media (hover: hover) {
      .workout-pill:hover { transform: translateX(-50%) translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.2); }
    }

    .workout-header-btn { border: none; padding: 8px 0; font-size: 13px; display: flex; align-items: center; gap: 4px; background: none; cursor: pointer; color: var(--text); transition: color var(--transition); }
    .workout-header-btn:active { transform: scale(0.97); }
    @media (hover: hover) {
      .workout-header-btn:hover { color: var(--accent); }
    }

    .accent-text { color: var(--accent); }

    .exercise-block.skipped { opacity: 0.5; border-style: dashed; }
    .exercise-block.skipped .exercise-name { text-decoration: line-through; }
    .exercise-block.clickable { cursor: pointer; }
    @media (hover: hover) {
      .exercise-block.clickable:hover { border-color: var(--accent); }
    }
    .nav-btn { display: inline-flex; align-items: center; gap: 4px; padding: 4px 12px; font-size: 12px; font-weight: 700; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); cursor: pointer; transition: all var(--transition); }
    .nav-btn:active { transform: scale(0.95); }
    .nav-btn:disabled { opacity: 0.3; pointer-events: none; }
    @media (hover: hover) { .nav-btn:hover { border-color: var(--accent); color: var(--accent); } }

    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
    .shake { animation: shake 0.3s ease; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 300; animation: fadeIn 0.15s ease; }
    .modal-box { background: var(--bg); border-radius: var(--radius); padding: 24px; width: 320px; max-width: 90vw; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
    .modal-box h2 { margin-bottom: 16px; }
    .modal-box label { display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); margin-bottom: 4px; }
    .modal-box input { margin-bottom: 12px; text-align: left; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

    .toggle-group { display: flex; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 16px; }
    .toggle-btn { flex: 1; padding: 10px; text-align: center; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; background: var(--bg); color: var(--text-secondary); transition: all var(--transition); border: none; }
    .toggle-btn.active { background: var(--accent); color: var(--text-inverse); }
    .toggle-btn:not(.active):hover { background: var(--bg-secondary); }

    .muscle-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border-light); cursor: pointer; }
    .muscle-row:hover { background: var(--accent-light); margin: 0 -8px; padding-left: 8px; padding-right: 8px; border-radius: var(--radius-sm); }
    .muscle-detail { display: none; padding: 8px 12px; background: var(--card-bg); border-radius: var(--radius-sm); margin: 4px 0 8px; font-size: 12px; line-height: 1.6; }
    .detail-ex + .detail-ex { margin-top: 4px; padding-top: 4px; border-top: 1px solid var(--border-light); }
    .detail-day { display: inline-block; font-size: 10px; font-weight: 600; color: var(--accent); background: var(--accent-light); padding: 1px 5px; border-radius: 3px; margin-right: 4px; }
    .detail-meta { color: var(--text-secondary); font-size: 11px; }
    .muscle-tooltip { display: none; }
    .muscle-label { width: 75px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; flex-shrink: 0; }
    .muscle-bar-wrap { flex: 1; height: 24px; position: relative; min-width: 40px; }
    .muscle-bar-bg { position: absolute; inset: 0; display: flex; align-items: center; }
    .muscle-bar-fill { height: 24px; border-radius: 3px; min-width: 4px; transition: width 0.6s ease; }
    .muscle-bar-range { position: absolute; top: 0; height: 24px; background: var(--range-bg); border-left: 2px solid var(--accent); border-right: 2px solid var(--accent); border-radius: 3px; }
    .muscle-value { width: 52px; text-align: right; font-size: 11px; font-weight: 700; font-variant-numeric: tabular-nums; flex-shrink: 0; }
    .muscle-status { width: 18px; text-align: center; flex-shrink: 0; font-size: 14px; }
    .muscle-note { font-size: 10px; color: var(--text-secondary); margin: 2px 0 4px 83px; }

    .fase-badge { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; background: var(--accent-light); color: var(--accent); padding: 2px 8px; border-radius: 3px; }

    .warmup-box { background: var(--accent-light); border: 1px dashed var(--accent); border-radius: var(--radius); padding: 12px; margin-bottom: 12px; font-size: 13px; animation: slideUp 0.3s ease; }
    .warmup-set { display: flex; align-items: center; gap: 12px; padding: 4px 4px; font-size: 12px; font-weight: 600; cursor: pointer; border-radius: var(--radius-sm); transition: background var(--transition); }
    .warmup-set:hover { background: var(--bg); }
    .warmup-set span:first-child { width: 18px; display: flex; align-items: center; }

    .dprog-alert { background: var(--accent-light); border: 1px solid var(--accent); border-radius: var(--radius); padding: 10px 12px; margin-bottom: 12px; font-size: 13px; font-weight: 600; color: var(--accent); animation: slideUp 0.3s ease; }

    .ex-note { font-size: 12px; color: var(--text-secondary); background: var(--bg-secondary); padding: 8px 12px; border-radius: var(--radius-sm); margin-bottom: 8px; display: flex; gap: 6px; align-items: flex-start; line-height: 1.4; }

    .program-block { margin-bottom: 20px; }
    .program-block h3 { margin-bottom: 8px; }
    .program-ex { display: flex; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border-light); font-size: 13px; }
    .program-ex .name { flex: 1; font-weight: 600; }
    .program-ex .detail { color: var(--text-secondary); font-size: 12px; white-space: nowrap; margin-left: 8px; }
    .program-table { width: 100%; font-size: 12px; border-collapse: collapse; }
    .program-table th, .program-table td { padding: 6px 8px; text-align: left; border-bottom: 1px solid var(--border-light); }
    .program-table th { font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; font-size: 11px; }
    .program-note { font-size: 12px; color: var(--text-secondary); padding: 8px 12px; background: var(--bg-secondary); border-radius: var(--radius-sm); margin-top: 4px; line-height: 1.4; }
    .program-star { color: var(--accent); }
    .program-priority { background: var(--accent-light); padding: 10px 12px; border-radius: var(--radius); margin-bottom: 12px; font-size: 13px; border-left: 3px solid var(--accent); }
    .program-priority .rank { font-weight: 700; color: var(--accent); }

    .btn-delete-workout { position: absolute; top: 8px; right: 8px; border: none; background: none; cursor: pointer; color: var(--accent-dark); padding: 4px; border-radius: var(--radius-sm); transition: all var(--transition); }
    @media (hover: hover) {
      .btn-delete-workout:hover { background: var(--accent-light); transform: scale(1.1); }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="view active" id="view-oggi"></div>
    <div class="view-full" id="view-allenamento"></div>
    <div class="view-full" id="view-riepilogo"></div>
    <div class="view" id="view-storico"></div>
    <div class="view" id="view-analisi"></div>
    <div class="view" id="view-programma"></div>
    <div class="view" id="view-impostazioni"></div>

    <div class="tab-bar" id="tab-bar">
      <div class="tab-item active" data-view="oggi"><span class="material-symbols-outlined">today</span> OGGI</div>
      <div class="tab-item" data-view="analisi"><span class="material-symbols-outlined">monitoring</span> ANALISI</div>
      <div class="tab-item" data-view="programma"><span class="material-symbols-outlined">menu_book</span> PROGRAMMA</div>
      <div class="tab-item" data-view="storico"><span class="material-symbols-outlined">history</span> STORICO</div>
      <div class="tab-item" data-view="impostazioni"><span class="material-symbols-outlined">tune</span></div>
    </div>
    <div class="workout-pill hidden" id="workout-pill" onclick="resumeWorkout()">
      <span id="pill-exercise-name"></span>
      <span class="material-symbols-outlined">arrow_forward</span>
    </div>
  </div>

    <script>
    const SUPABASE_URL = 'https://your-project.supabase.co';
    const SUPABASE_ANON_KEY = 'your-anon-key';
    var supabaseClient = null;
    try {
      if (typeof supabase !== 'undefined' && !SUPABASE_URL.includes('your-project')) {
        supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      }
    } catch(e) {
      console.warn('Supabase sync not available, running offline:', e);
    }

    const state = {
      currentView: 'oggi',
      activeWorkout: null,
      currentExercise: 0,
      currentSet: 0,
      editingDay: 0,
      templates: [],
      lastWeights: {},
      workoutHistory: [],
      timerInterval: null,
      timerSeconds: 0,
      workoutTimerInterval: null,
      workoutStartTime: null,
      restExerciseIndex: -1,
      analisiLevel: 'intermediate',
      analisiMode: 'reale',
      fase: 1, // 1, 2, 3, 'deload'
      darkMode: null, // null=system, true=dark, false=light
      progressoEsercizio: null,
      _notesOpen: null,
      dataVersion: 0,
    };

    var MUSCLE_MAP = {
      "Panca inclinata manubri": "Chest",
      "Lat Machine presa neutra": "Back",
      "Chest Press macchina (convergente)": "Chest",
      "Chest press convergente": "Chest",
      "Rematore chest-supported": "Back",
      "Rematore macchina chest-supported": "Back",
      "Rematore macchina": "Back",
      "Rematore convergente macchina": "Back",
      "Alzate laterali ai cavi": "Deltoidi laterali",
      "Alzate laterali ai cavi (unilaterali)": "Deltoidi laterali",
      "Alzate laterali unilaterali ai cavi": "Deltoidi laterali",
      "Shrug manubri": "Upper traps",
      "Shrug manubri o macchina": "Upper traps",
      "Shrug macchina/manubri": "Upper traps",
      "Shrug pesanti (bilanciere/manubri)": "Upper traps",
      "Shrug pesanti (manubri o macchina)": "Upper traps",
      "Reverse Cable Fly": "Deltoidi posteriori",
      "Reverse cable fly": "Deltoidi posteriori",
      "Reverse fly cavi": "Deltoidi posteriori",
      "Rear Delt Row ai cavi": "Deltoidi posteriori",
      "Rear delt cable row": "Deltoidi posteriori",

    function loadCache() {
      try {

        if (cached) {
          const data = JSON.parse(cached);
          if (data.fase) state.fase = data.fase;
          if (data.lastWeights) state.lastWeights = data.lastWeights;
          if (data.templates) state.templates = data.templates;
          if (data.activeWorkout) {
            var oggi = new Date().toISOString().split('T')[0];
            if (data.activeWorkout.data === oggi) {
              state.activeWorkout = data.activeWorkout;
              state.currentExercise = data.currentExercise || 0;
              state.currentSet = data.currentSet || 0;
              state.workoutStartTime = data.workoutStartTime || Date.now();
            }
          }
        }
        const history = localStorage.getItem('workout_history');
        if (history) state.workoutHistory = JSON.parse(history);
      } catch(e) { console.warn('Cache load error:', e); }
    }

    function startWorkout(giorno) {
      var oggi = new Date();
      var oggiDataStr = oggi.toISOString().split('T')[0];
      if (!giorno) {
        var giorniScheda = [null, 'Upper A', 'Lower A', 'Specializzazione', 'Upper B', 'Lower B', null];
        giorno = giorniScheda[oggi.getDay()];
        if (!giorno) return;
      }

      // If same workout already in progress today, resume
      if (state.activeWorkout && state.activeWorkout.giorno === giorno && state.activeWorkout.data === oggiDataStr) {
        // resume
      } else {
        var template = state.templates.find(function(t) { return t.giorno === giorno; });
        if (!template) return;
        var exercises = template.esercizi.map(function(ex) {
          var last = state.lastWeights[ex.nome];
          var adjSerie = getSerieAdjusted(ex);
          var sets = [];
          for (var s = 0; s < adjSerie; s++) {
            sets.push({
              serie_numero: s + 1,
              ripetizioni: null,
              peso_kg: last ? last.peso : null,
              rir: last ? last.rir : null,
              completato: false,
            });
          }
          return { nome: ex.nome, serieTarget: adjSerie, recupero: ex.recupero, sets: sets };
        });

        state.activeWorkout = {
          data: oggiDataStr,
          giorno: giorno,
          exercises: exercises,
          completato: false,
        };
        state.currentExercise = 0;
        state.currentSet = 0;
        state.workoutStartTime = Date.now();
        state.restExerciseIndex = -1;
      }

      saveCache();
      document.getElementById('tab-bar').classList.add('hidden');
      document.getElementById('workout-pill').classList.add('hidden');
      navigate('allenamento');
      renderAllenamento();
      startWorkoutTimer();
    }
    function startWorkoutTimer() {
      clearInterval(state.workoutTimerInterval);
      state.workoutTimerInterval = setInterval(function() {
        var display = document.getElementById('timer-display');
        if (display && state.workoutStartTime) {
          display.textContent = formatTime(Math.floor((Date.now() - state.workoutStartTime) / 1000));
        }
      }, 1000);
    }

    function navigateToExercise(exIdx) {
      if (exIdx < 0 || exIdx >= state.activeWorkout.exercises.length) return;
      state.currentExercise = exIdx;
      var ex = state.activeWorkout.exercises[exIdx];
      state.currentSet = 0;
      for (var i = 0; i < ex.sets.length; i++) {
        if (!ex.sets[i].completato) { state.currentSet = i; break; }
      }
      renderAllenamento();
      saveCache();
    }

    function renderAllenamento() {
      var view = document.getElementById('view-allenamento');
      if (!state.activeWorkout) return;
      var exercises = state.activeWorkout.exercises;
      var templateGiorno = state.templates.find(function(t) { return t.giorno === state.activeWorkout.giorno; });
      var totalSets = 0, completedSets = 0;
      exercises.forEach(function(ex) {
        ex.sets.forEach(function(s) { totalSets++; if (s.completato) completedSets++; });
      });
      var pct = totalSets > 0 ? Math.round(completedSets / totalSets * 100) : 0;
      var isFirstEx = state.currentExercise === 0;
      var isLastEx = state.currentExercise >= exercises.length - 1;
      var currentEx = exercises[state.currentExercise];
      var templateCurrentEx = templateGiorno ? templateGiorno.esercizi[state.currentExercise] : null;

      // Double progression check: if current exercise is all done, check if all reps hit max
      var allDoneAllMax = false;
      if (currentEx && templateCurrentEx) {
        var repsRange = templateCurrentEx.reps;
        var parts = repsRange.split('-');
        if (parts.length === 2) {
          var maxRep = parseInt(parts[1]);
          if (maxRep && currentEx.sets.every(function(s) { return s.completato && parseInt(s.ripetizioni) >= maxRep; })) {
            allDoneAllMax = true;
          }
        }
      }

      var html = '';
      html += '<div class="workout-sticky">';
      var faseLabel = state.fase === 'deload' ? 'Deload' : 'Fase ' + state.fase;
      html += '<div class="flex items-center justify-between mb-8"><button class="workout-header-btn" onclick="exitWorkout()"><span class="material-symbols-outlined">arrow_back</span> ' + state.activeWorkout.giorno + '</button><div class="flex items-center gap-8"><span class="fase-badge">' + faseLabel + '</span><div class="timer"><span class="material-symbols-outlined" style="font-size: 16px; color: var(--text-secondary);">schedule</span><span id="timer-display">' + formatTime(Math.floor((Date.now() - state.workoutStartTime) / 1000)) + '</span></div><button class="btn btn-ghost btn-sm" style="color: var(--accent);" onclick="if(confirm(\'Terminare l\\\'allenamento?\'))finishWorkout()">Fine</button></div></div>';

      // Navigation prev/next
      html += '<div class="flex items-center gap-8 mb-12">';
      html += '<button class="nav-btn" onclick="navigateToExercise(' + (state.currentExercise - 1) + ')"' + (isFirstEx ? ' disabled' : '') + '><span class="material-symbols-outlined" style="font-size: 14px;">chevron_left</span> Prec</button>';
      html += '<span class="muted" style="flex:1; text-align:center;">' + (state.currentExercise + 1) + ' / ' + exercises.length + '</span>';
      html += '<button class="nav-btn" onclick="navigateToExercise(' + (state.currentExercise + 1) + ')"' + (isLastEx ? ' disabled' : '') + '>Succ <span class="material-symbols-outlined" style="font-size: 14px;">chevron_right</span></button>';
      html += '</div>';

      // Progress bar
      html += '<div class="workout-progress mb-12"><div class="bar"><div class="bar-fill" style="width: ' + pct + '%;"></div></div><span class="muted">' + completedSets + '/' + totalSets + '</span></div>';

      // Rest timer (prominent, if active)
      if (state.restExerciseIndex >= 0) {
        var restEx = exercises[state.restExerciseIndex];
        if (restEx) {
          var remaining = Math.max(0, restEx.recupero - state.timerSeconds);
          var fillPct = state.timerSeconds > 0 ? Math.min(100, (state.timerSeconds / restEx.recupero) * 100) : 0;
          html += '<div class="rest-timer" id="rest-timer-bar" style="background: var(--accent-light); padding: 8px 12px; border-radius: var(--radius); margin-bottom: 12px;">Recupero <span id="rest-display" style="font-size: 18px;">' + formatTime(remaining) + '</span><div class="timer-bar"><div id="rest-bar-fill" class="timer-bar-fill" style="width: ' + fillPct + '%;"></div></div></div>';
        }
      }

      // Double progression coach alert
      if (allDoneAllMax && templateCurrentEx) {
        var oldWeight = state.lastWeights[currentEx.nome];
        var suggestPeso = oldWeight ? Math.ceil((oldWeight.peso + 2.5) / 2.5) * 2.5 : '';
        html += '<div class="dprog-alert">Tutte le serie al massimo delle ripetizioni! ' + (suggestPeso ? 'Prova ad aumentare a ' + suggestPeso + ' kg.' : 'Aumenta il carico al prossimo allenamento.') + '</div>';
      }

      html += '</div>'; // .workout-sticky

      // Scrollable exercises
      html += '<div class="workout-scroll">';
      exercises.forEach(function(ex, exIdx) {
        var templateEx = templateGiorno ? templateGiorno.esercizi[exIdx] : null;
        var targetReps = templateEx ? templateEx.reps : '';
        var isCurrentEx = exIdx === state.currentExercise;
        var last = state.lastWeights[ex.nome];
        var allSetsDone = ex.sets.length > 0 && ex.sets.every(function(s) { return s.completato; });
        var noneSetDone = ex.sets.length > 0 && ex.sets.every(function(s) { return !s.completato; });
        var isSkipped = exIdx < state.currentExercise && noneSetDone && !allSetsDone;

        // Warm-up guide before first compound exercise
        if (isCurrentEx && WARMUP_COMPOUNDS.indexOf(ex.nome) >= 0) {
          var warmWeight = last ? last.peso : null;
          // Ensure warmupSets array exists
          if (!ex.warmupSets) {
            var warmSetsDef = [];
            if (ex.sets.length <= 1) warmSetsDef.push({ pct: 50, reps: targetReps });
            else if (ex.sets.length === 2) warmSetsDef.push({ pct: 50, reps: targetReps }, { pct: 70, reps: targetReps });
            else if (ex.sets.length === 3) warmSetsDef.push({ pct: 45, reps: targetReps }, { pct: 65, reps: targetReps }, { pct: 85, reps: targetReps });
            else warmSetsDef.push({ pct: 45, reps: targetReps }, { pct: 60, reps: targetReps }, { pct: 75, reps: targetReps }, { pct: 85, reps: targetReps });
            ex.warmupSets = warmSetsDef.map(function(ws, i) { return { pct: ws.pct, reps: ws.reps, done: false }; });
          }
          var allWarmDone = ex.warmupSets.every(function(ws) { return ws.done; });
          html += '<div class="warmup-box">';
          html += '<div class="flex items-center gap-8 mb-8"><span class="material-symbols-outlined" style="font-size: 16px; color: var(--accent);">local_fire_department</span><span style="font-weight: 700; font-size: 13px;">Riscaldamento</span></div>';
          ex.warmupSets.forEach(function(ws, i) {
            var w = warmWeight ? Math.round(warmWeight * ws.pct / 100) + ' kg' : '—';
            html += '<div class="warmup-set" onclick="toggleWarmupSet(' + exIdx + ',' + i + ')" style="cursor: pointer;"><span class="material-symbols-outlined" style="font-size: 14px; color: ' + (ws.done ? 'var(--accent)' : 'var(--text-secondary)') + ';">' + (ws.done ? 'check_circle' : 'radio_button_unchecked') + '</span><span>' + ws.pct + '%</span><span>' + w + '</span><span>' + (ws.reps || '—') + ' reps</span></div>';
          });
          html += '<div class="muted mt-8" style="font-size: 11px;">' + (allWarmDone ? '✓ Riscaldamento completato' : 'Poi via con le ' + ex.sets.length + ' serie di lavoro') + '</div>';
          html += '</div>';
        }

        var exClasses = 'exercise-block';
        if (isCurrentEx) exClasses += ' current';
        if (isSkipped) exClasses += ' skipped';
        if (!isCurrentEx) exClasses += ' clickable';

        html += '<div class="' + exClasses + '"' + (!isCurrentEx ? ' onclick="navigateToExercise(' + exIdx + ')"' : '') + '>';
        html += '<div class="flex items-center justify-between mb-8"><div><div class="exercise-name">' + (isSkipped ? '<span class="muted">Saltato: </span>' : '') + ex.nome + '</div><div class="exercise-meta">' + ex.serieTarget + ' serie · target ' + targetReps + ' reps · RPE ' + (templateEx ? templateEx.rpeTarget : '') + (allSetsDone ? ' <span class="material-symbols-outlined accent-text" style="font-size: 14px;">check_circle</span>' : '') + '</div></div><div style="display: flex; gap: 4px;">' + (EXERCISE_NOTES[ex.nome] ? '<button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();toggleNotes(' + exIdx + ')"><span class="material-symbols-outlined" style="font-size: 16px;">info</span></button>' : '') + (isCurrentEx ? '<button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();skipExercise(' + exIdx + ')">Salta</button>' : '') + '</div></div>';

        // Notes panel (expandable)
        if (EXERCISE_NOTES[ex.nome]) {
          var isOpen = state._notesOpen === exIdx;
          html += '<div class="ex-note" id="ex-note-' + exIdx + '"' + (isOpen ? '' : ' style="display: none;"') + '><span class="material-symbols-outlined" style="font-size: 14px; color: var(--accent);">info</span> ' + EXERCISE_NOTES[ex.nome] + '</div>';
        }

        html += '<div class="set-grid header"><div></div><div>Rep</div><div>Peso</div><div>RPE</div><div></div></div>';

        ex.sets.forEach(function(set, setIdx) {
          var isCurrentSet = isCurrentEx && setIdx === state.currentSet && !set.completato;
          var opacity = set.completato ? '' : (isCurrentSet ? '' : 'op-50');

          html += '<div class="set-grid ' + opacity + '"><div class="set-cell" style="font-weight: 700;">' + set.serie_numero + '</div>';

          var repsVal = set.ripetizioni || (isCurrentSet && last ? last.reps : '');
          var pesoVal = set.peso_kg || (isCurrentSet && last ? last.peso : '');
          var rirVal = set.rir || (isCurrentSet && last ? last.rir : '');

          html += '<div class="set-cell"><input type="number" id="input-reps-' + exIdx + '-' + setIdx + '" value="' + repsVal + '" min="1" max="30" style="width: 48px;" placeholder="' + (last && isCurrentSet ? last.reps : '') + '"' + (!isCurrentSet && !set.completato ? ' disabled' : '') + ' onblur="updateSet(' + exIdx + ',' + setIdx + ',\'ripetizioni\',this.value)"' + '></div>';
          html += '<div class="set-cell"><input type="number" id="input-peso-' + exIdx + '-' + setIdx + '" value="' + pesoVal + '" min="0" step="0.5" style="width: 64px;" placeholder="' + (last && isCurrentSet ? last.peso + 'kg' : '') + '"' + (!isCurrentSet && !set.completato ? ' disabled' : '') + ' onblur="updateSet(' + exIdx + ',' + setIdx + ',\'peso_kg\',this.value)"' + '></div>';
          html += '<div class="set-cell"><input type="number" id="input-rir-' + exIdx + '-' + setIdx + '" value="' + rirVal + '" min="6.5" max="10" step="0.5" style="width: 46px;" placeholder="' + (last && isCurrentSet ? last.rir : (templateEx ? templateEx.rpeTarget : '')) + '"' + (!isCurrentSet && !set.completato ? ' disabled' : '') + ' onblur="updateSet(' + exIdx + ',' + setIdx + ',\'rir\',this.value)"' + '></div>';

          html += '<div class="set-cell">';
          if (set.completato) {
            html += '<div class="set-check done" onclick="uncompleteSet(' + exIdx + ',' + setIdx + ')"><span class="material-symbols-outlined" style="font-size: 16px; color: var(--text-inverse);">check</span></div>';
          } else if (isCurrentSet) {
            html += '<div class="set-check" onclick="completeSet()"><span class="material-symbols-outlined" style="font-size: 16px;">check</span></div>';
          } else {
            html += '<div class="set-check" style="opacity: 0.2;"><span class="material-symbols-outlined" style="font-size: 16px;">check</span></div>';
          }
          html += '</div>';

          html += '</div>';
        });

        html += '</div>';
      });

      html += '</div>'; // .workout-scroll
      view.innerHTML = html;
    }

    function toggleNotes(exIdx) {
      state._notesOpen = state._notesOpen === exIdx ? null : exIdx;
      renderAllenamento();
    }

    function toggleWarmupSet(exIdx, setIdx) {
      if (!state.activeWorkout) return;
      var ex = state.activeWorkout.exercises[exIdx];
      if (!ex || !ex.warmupSets) return;
      ex.warmupSets[setIdx].done = !ex.warmupSets[setIdx].done;
      renderAllenamento();
    }

    function completeSet() {
      var exIdx = state.currentExercise;
      var currentEx = state.activeWorkout.exercises[exIdx];
      var set = currentEx.sets[state.currentSet];
      var repsInput = document.getElementById('input-reps-' + exIdx + '-' + state.currentSet);
      var pesoInput = document.getElementById('input-peso-' + exIdx + '-' + state.currentSet);
      var rirInput = document.getElementById('input-rir-' + exIdx + '-' + state.currentSet);
      var reps = repsInput && repsInput.value !== '' ? parseFloat(repsInput.value) : null;
      var peso = pesoInput && pesoInput.value !== '' ? parseFloat(pesoInput.value) : null;
      var rir = rirInput && rirInput.value !== '' ? parseFloat(rirInput.value) : null;

      var hasData = (reps !== null && reps > 0) || (peso !== null && peso > 0);
      if (!hasData) {
        if (repsInput) repsInput.classList.add('shake');
        if (pesoInput) pesoInput.classList.add('shake');
        setTimeout(function() {
          if (repsInput) repsInput.classList.remove('shake');
          if (pesoInput) pesoInput.classList.remove('shake');
        }, 300);
        return;
      }

      set.ripetizioni = reps;
      set.peso_kg = peso;
      set.rir = rir;
      set.completato = true;
      state.lastWeights[currentEx.nome] = { reps: reps, peso: peso, rir: rir };
      saveCache();

      var isLastSet = state.currentSet + 1 >= currentEx.sets.length;
      if (isLastSet) {
        var hasMoreExercises = exIdx + 1 < state.activeWorkout.exercises.length;
        if (hasMoreExercises && !confirm(currentEx.nome + ' completato. Passare al prossimo esercizio?')) {
          state.restExerciseIndex = exIdx;
          renderAllenamento();
          return;
        }
        state.restExerciseIndex = exIdx;
        state.currentExercise++;
        state.currentSet = 0;
        renderAllenamento();
        startRestTimer(currentEx.recupero);
        if (state.currentExercise >= state.activeWorkout.exercises.length) {
          finishWorkout();
        }
        return;
      }

      state.restExerciseIndex = exIdx;
      state.currentSet++;
      renderAllenamento();
      startRestTimer(currentEx.recupero);
    }

    function skipExercise(exIdx) {
      if (!confirm('Saltare ' + state.activeWorkout.exercises[exIdx].nome + '?')) return;
      clearInterval(state.timerInterval);
      state.currentExercise = exIdx + 1;
      state.currentSet = 0;
      state.restExerciseIndex = -1;
      if (state.currentExercise >= state.activeWorkout.exercises.length) {
        finishWorkout();
      } else {
        renderAllenamento();
      }
    }

    function updateSet(exIdx, setIdx, field, value) {
      var ex = state.activeWorkout.exercises[exIdx];
      if (!ex) return;
      var set = ex.sets[setIdx];
      if (!set) return;
      var v = value !== '' ? parseFloat(value) : null;
      if (field === 'ripetizioni') set.ripetizioni = v;
      else if (field === 'peso_kg') set.peso_kg = v;
      else if (field === 'rir') set.rir = v;
      if (v !== null && v > 0 && field !== 'rir') {
        state.lastWeights[ex.nome] = state.lastWeights[ex.nome] || {};
        if (field === 'ripetizioni') state.lastWeights[ex.nome].reps = v;
        if (field === 'peso_kg') state.lastWeights[ex.nome].peso = v;
      }
      saveCache();
    }

    function uncompleteSet(exIdx, setIdx) {
      var ex = state.activeWorkout.exercises[exIdx];
      if (!ex) return;
      var set = ex.sets[setIdx];
      if (!set || !set.completato) return;
      set.completato = false;
      state.currentExercise = exIdx;
      state.currentSet = setIdx;
      state.restExerciseIndex = -1;
      clearInterval(state.timerInterval);
      renderAllenamento();
      saveCache();
    }

    function startRestTimer(seconds) {
      clearInterval(state.timerInterval);
      state.timerSeconds = 0;
      var totalSeconds = seconds;
      var restDisplay = document.getElementById('rest-display');
      var restBarFill = document.getElementById('rest-bar-fill');
      if (!restDisplay) return;

      state.timerInterval = setInterval(function() {
        state.timerSeconds++;
        var remaining = Math.max(0, totalSeconds - state.timerSeconds);
        if (restDisplay) restDisplay.textContent = formatTime(remaining);
        if (restBarFill) restBarFill.style.width = ((state.timerSeconds / totalSeconds) * 100) + '%';
          if (state.timerSeconds >= totalSeconds) {
          clearInterval(state.timerInterval);
          try {
            var ctx = new (window.AudioContext || window.webkitAudioContext)();
            var osc = ctx.createOscillator();
            osc.type = 'sine';
            osc.frequency.value = 800;
            osc.connect(ctx.destination);
            osc.start();
            setTimeout(function() { osc.stop(); }, 200);
          } catch(e) {}
          try { navigator.vibrate(200); } catch(e) {}
          if (Notification.permission === 'granted') {
            new Notification('Recupero finito!', { body: 'Tempo di iniziare la prossima serie.' });
          }
        }
      }, 1000);
    }

    function formatTime(seconds) {
      var m = Math.floor(seconds / 60);
      var s = seconds % 60;
      return m + ':' + (s < 10 ? '0' : '') + s;
    }

    function exitWorkout() {
      clearInterval(state.timerInterval);
      clearInterval(state.workoutTimerInterval);
      state.workoutTimerInterval = null;
      state.restExerciseIndex = -1;
      if (state.activeWorkout) {
        var ex = state.activeWorkout.exercises[state.currentExercise];
        if (ex) document.getElementById('pill-exercise-name').textContent = ex.nome;
        document.getElementById('workout-pill').classList.remove('hidden');
      }
      document.getElementById('tab-bar').classList.remove('hidden');
      navigate('oggi');
      renderOggi();
    }

    function resumeWorkout() {
      document.getElementById('workout-pill').classList.add('hidden');
      document.getElementById('tab-bar').classList.add('hidden');
      navigate('allenamento');
      renderAllenamento();
      startWorkoutTimer();
    }

    function finishWorkout() {
      clearInterval(state.timerInterval);
      clearInterval(state.workoutTimerInterval);
      state.workoutTimerInterval = null;
      state.restExerciseIndex = -1;
      document.getElementById('workout-pill').classList.add('hidden');
      var duration = Math.floor((Date.now() - state.workoutStartTime) / 1000);
      var workoutRecord = {
        id: crypto.randomUUID(),
        data: state.activeWorkout.data,
        giorno: state.activeWorkout.giorno,
        durata_secondi: duration,
        completato: true,
        exercises: state.activeWorkout.exercises.map(function(ex) {
          return {
            nome: ex.nome,
            sets: ex.sets.map(function(s) {
              return { serie_numero: s.serie_numero, ripetizioni: s.ripetizioni, peso_kg: s.peso_kg, rir: s.rir, completato: s.completato };
            }),
          };
        }),
      };
      state.workoutHistory.push(workoutRecord);
      state.activeWorkout = null;
      state.currentExercise = 0;
      state.currentSet = 0;
      saveCache();
      syncWorkout(workoutRecord);
      renderRiepilogo(workoutRecord);
      navigate('riepilogo');
    }

    function renderRiepilogo(workout) {
      var view = document.getElementById('view-riepilogo');
      var totalVolume = 0;
      var totalSets = 0;
      var html = '<div><h1>Allenamento completato</h1><p class="muted mb-16">' + workout.giorno + ' · ' + Math.floor(workout.durata_secondi / 60) + ' minuti</p><div class="divider"></div>';

      workout.exercises.forEach(function(ex) {
        var doneSets = ex.sets.filter(function(s) { return s.completato; });
        if (doneSets.length === 0) return;
        var volume = doneSets.reduce(function(sum, s) { return sum + (s.ripetizioni * s.peso_kg); }, 0);
        totalVolume += volume;
        totalSets += doneSets.length;
        html += '<div class="flex items-center justify-between" style="padding: 8px 0; border-bottom: 1px solid var(--border-light);"><div><div class="exercise-name" style="font-size: 14px;">' + ex.nome + '</div><div class="muted">' + doneSets.length + ' serie · ' + doneSets.map(function(s) { return s.ripetizioni + '×' + s.peso_kg + 'kg'; }).join(', ') + '</div></div><div class="accent-text" style="font-weight: 700;">' + volume + ' kg</div></div>';
      });

      html += '<div class="divider"></div><div class="flex justify-between" style="font-size: 18px;"><div><span style="font-weight: 700;">' + totalVolume + ' kg</span> <span class="muted">volume</span></div><div><span style="font-weight: 700;">' + totalSets + '</span> <span class="muted">serie</span></div><div><span style="font-weight: 700;">' + Math.floor(workout.durata_secondi / 60) + '\'</span> <span class="muted">durata</span></div></div><div class="divider"></div><button class="btn btn-block mt-16" onclick="afterRiepilogo()">Chiudi</button></div>';
      view.innerHTML = html;
    }

    function afterRiepilogo() {
      document.getElementById('tab-bar').classList.remove('hidden');
      navigate('oggi');
      renderOggi();
    }

    function getMuscleGroup(exName) {
      return MUSCLE_MAP[exName] || null;
    }

    function getExercisesForMuscle(mg) {
      var seen = {};
      state.templates.forEach(function(day) {
        day.esercizi.forEach(function(ex) {
          if (getMuscleGroup(ex.nome) === mg && !seen[ex.nome]) {
            seen[ex.nome] = true;
          }
        });
      });
      return Object.keys(seen);
    }

    function getExerciseDetailsForMuscle(mg) {
      var details = [];
      state.templates.forEach(function(day) {
        day.esercizi.forEach(function(ex) {
          if (getMuscleGroup(ex.nome) === mg) {
            details.push({ giorno: day.giorno, nome: ex.nome, serie: ex.serie, reps: ex.reps, rpe: ex.rpeTarget });
          }
        });
      });
      return details;
    }

    function parseRepsMidpoint(repsStr) {
      if (!repsStr || repsStr.indexOf('s') >= 0) return null;
      var parts = repsStr.split('-');
      if (parts.length === 2) return (parseFloat(parts[0]) + parseFloat(parts[1])) / 2;
      return parseFloat(repsStr) || null;
    }

    function calcIdealSetsByMuscle() {
      var sets = {};
      state.templates.forEach(function(day) {
        day.esercizi.forEach(function(ex) {
          var mg = getMuscleGroup(ex.nome);
          if (!mg) return;
          sets[mg] = (sets[mg] || 0) + ex.serie;
        });
      });
      return sets;
    }

    function calcRealSetsByMuscle(weeks) {
      var sets = {};
      var now = new Date();
      var cutoff = new Date(now);
      cutoff.setDate(cutoff.getDate() - weeks * 7);
      var filtered = state.workoutHistory.filter(function(w) {
        return new Date(w.data) >= cutoff;
      });
      var weekCount = Math.max(1, Math.ceil((now - cutoff) / (7 * 86400000)));
      filtered.forEach(function(w) {
        w.exercises.forEach(function(ex) {
          var mg = getMuscleGroup(ex.nome);
          if (!mg) return;
          var done = ex.sets.filter(function(s) { return s.completato; }).length;
          sets[mg] = (sets[mg] || 0) + done;
        });
      });
      for (var mg in sets) {
        sets[mg] = Math.round(sets[mg] / weekCount);
      }
      return sets;
    }

    function setAnalisiLevel(level) {
      state.analisiLevel = level;
      renderAnalisi();
    }

    function setAnalisiMode(mode) {
      state.analisiMode = mode;
      renderAnalisi();
    }

    function renderAnalisi() {
      var view = document.getElementById('view-analisi');
      var idealSets = calcIdealSetsByMuscle();
      var realSets = calcRealSetsByMuscle(4);
      var setsData = state.analisiMode === 'ideale' ? idealSets : realSets;
      var level = state.analisiLevel;
      var range = VOLUME_RANGES;
      var levelKeyMap = { beginner: 'beginner', intermediate: 'intermediate', advanced: 'advanced' };
      var lk = levelKeyMap[level] || 'intermediate';

      var muscleOrder = ["Quads","Hamstrings","Glutes","Chest","Back","Deltoidi laterali","Deltoidi posteriori","Biceps","Triceps","Abs","Calves","Upper traps","Forearms"];

      var html = '<div><h1>Analisi</h1>';

      // Level selector
      html += '<div class="toggle-group mb-12">';
      ['beginner','intermediate','advanced'].forEach(function(l) {
        html += '<button class="toggle-btn' + (l === level ? ' active' : '') + '" onclick="setAnalisiLevel(\'' + l + '\')">' + l.charAt(0).toUpperCase() + l.slice(1) + '</button>';
      });
      html += '</div>';

      // Mode toggle
      html += '<div class="toggle-group mb-12">';
      html += '<button class="toggle-btn' + (state.analisiMode === 'ideale' ? ' active' : '') + '" onclick="setAnalisiMode(\'ideale\')">Ideale</button>';
      html += '<button class="toggle-btn' + (state.analisiMode === 'reale' ? ' active' : '') + '" onclick="setAnalisiMode(\'reale\')">Reale</button>';
      html += '</div>';

      // Chart
      var maxSets = 0;
      muscleOrder.forEach(function(mg) {
        var v = setsData[mg] || 0;
        if (v > maxSets) maxSets = v;
      });
      // Also consider range maxima so range bars don't overflow
      muscleOrder.forEach(function(mg) {
        var r = range[mg];
        if (r) {
          var maxR = r[lk][1];
          if (maxR > maxSets) maxSets = maxR;
        }
      });
      if (maxSets === 0) maxSets = 1;

      html += '<div class="mt-8">';
      muscleOrder.forEach(function(mg) {
        var v = setsData[mg] || 0;
        var r = range[mg];
        if (!r) return;
        var target = r[lk];
        var minW = target[0], maxW = target[1];
        var pct = Math.min(100, Math.round(v / maxSets * 100));
        var rangeStart = Math.round(minW / maxSets * 100);
        var rangeEnd = Math.round(maxW / maxSets * 100);

        var status, statusIcon, statusColor;
        if (v < minW) { status = 'sotto'; statusIcon = '<span class="material-symbols-outlined" style="font-size: 14px;">warning</span>'; statusColor = 'var(--accent)'; }
        else if (v > maxW) { status = 'sopra'; statusIcon = '<span class="material-symbols-outlined" style="font-size: 14px;">bolt</span>'; statusColor = 'var(--accent-dark)'; }
        else { status = 'ok'; statusIcon = '<span class="material-symbols-outlined" style="font-size: 14px;">check_circle</span>'; statusColor = 'var(--ok-color)'; }

        var exDetails = getExerciseDetailsForMuscle(mg);

      // === Progress chart per exercise ===

    function buildProgressChartSVG(exName) {
      if (!exName) return '<p class="muted" style="font-size:12px;">Seleziona un esercizio.</p>';

      // Collect all completed sets for this exercise from history, grouped by date
      var points = []; // [{ date: '2026-07-04', weight: 50, label: '04/07' }]
      state.workoutHistory.forEach(function(w) {
        var ex = w.exercises.find(function(e) { return e.nome === exName; });
        if (!ex) return;
        var maxWeight = 0;
        ex.sets.forEach(function(s) {
          if (s.completato && s.peso_kg > 0 && s.peso_kg > maxWeight) maxWeight = s.peso_kg;
        });
        if (maxWeight > 0) {
          var d = new Date(w.data);
          var label = ('0' + d.getDate()).slice(-2) + '/' + ('0' + (d.getMonth()+1)).slice(-2);
          points.push({ date: w.data, weight: maxWeight, label: label });
        }
      });

      if (points.length < 2) {
        return '<p class="muted" style="font-size:12px;">Servono almeno 2 allenamenti con peso registrato per vedere un grafico.</p>';
      }

      var W = 300, H = 150;
      var padL = 32, padR = 8, padT = 12, padB = 24;
      var chartW = W - padL - padR;
      var chartH = H - padT - padB;

      var weights = points.map(function(p) { return p.weight; });
      var maxVal = Math.max.apply(null, weights);
      var minVal = Math.max(0, Math.min.apply(null, weights) - 5);
      if (minVal === maxVal) { minVal = maxVal - 5; if (minVal < 0) minVal = 0; }
      var range = maxVal - minVal || 1;

      var svg = '<svg viewBox="0 0 ' + W + ' ' + H + '" style="width:100%;height:100%;font-size:9px;overflow:visible;">';

      // Y axis labels
      for (var i = 0; i <= 4; i++) {
        var val = minVal + (range * i / 4);
        var y = padT + chartH - (chartH * i / 4);
        svg += '<text x="' + (padL - 4) + '" y="' + (y + 3) + '" text-anchor="end" fill="var(--text-secondary)">' + Math.round(val) + '</text>';
        svg += '<line x1="' + padL + '" y1="' + y + '" x2="' + (W - padR) + '" y2="' + y + '" stroke="var(--border)" stroke-width="0.5"/>';
      }

      // Data line & dots
      var linePoints = [];
      points.forEach(function(p, i) {
        var x = padL + (chartW * i / (points.length - 1));
        var y = padT + chartH - (chartH * (p.weight - minVal) / range);
        linePoints.push(x + ',' + y);
        // Dot
        svg += '<circle cx="' + x + '" cy="' + y + '" r="3" fill="var(--accent)" stroke="#fff" stroke-width="1.5"/>';
        // Date label
        svg += '<text x="' + x + '" y="' + (padT + chartH + 14) + '" text-anchor="end" transform="rotate(-30,' + x + ',' + (padT + chartH + 14) + ')" fill="var(--text-secondary)">' + p.label + '</text>';
        // Weight label
        svg += '<text x="' + x + '" y="' + (y - 6) + '" text-anchor="middle" font-weight="700" fill="var(--accent)">' + p.weight + '</text>';
      });
      svg += '<polyline points="' + linePoints.join(' ') + '" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round"/>';

      svg += '</svg>';
      return svg;
    }

    function renderStorico() {
      var view = document.getElementById('view-storico');

        weekKeys.slice(0, 6).forEach(function(weekKey) {
          var week = weeks[weekKey];

          html += '<div class="flex items-center gap-8 mb-8"><div style="width: 60px; font-size: 11px; color: var(--text-secondary); text-align: right;">' + week.label + '</div><div class="chart-bar" style="width: ' + pct + '%;"></div><div style="font-size: 12px; font-weight: 700; min-width: 60px;">' + (week.volume / 1000).toFixed(1) + 'k kg</div></div>';
        });

          try {
            anime({ targets: '.chart-bar', width: function(el) { return el.style.width; }, easing: 'easeOutCubic', duration: 800, delay: anime.stagger(100) });
          } catch(e) {}
        }, 100);

            html += '<div style="text-align: center;"><div style="font-size: 10px; color: var(--text-secondary); text-transform: uppercase;">' + d.name + '</div><div style="width: 32px; height: 32px; border-radius: 50%; background: ' + (d.done ? '#1a1a1a' : '#f0f0f0') + '; display: flex; align-items: center; justify-content: center; margin: 4px auto 0; color: ' + (d.done ? '#fff' : '#767676') + ';">' + (d.done ? '<span class="material-symbols-outlined" style="font-size: 16px; color: #fff;">check</span>' : '<span class="material-symbols-outlined" style="font-size: 14px;">radio_button_unchecked</span>') + '</div></div>';

        allExercises.slice(0, 5).forEach(function(exName) {
          var entries = [];

            w.exercises.filter(function(e) { return e.nome === exName; }).forEach(function(e) {

    function viewWorkoutDetail(id) {
      var workout = state.workoutHistory.find(function(w) { return w.id === id; });
      if (!workout) return;
      var totalVolume = 0;
      var totalSets = 0;
      var html = '<div class="modal-box" style="max-height: 80vh; overflow-y: auto;"><h2>' + workout.giorno + '</h2><p class="muted mb-16">' + workout.data + ' · ' + Math.floor(workout.durata_secondi / 60) + ' minuti</p><div class="divider"></div>';

    function deleteWorkout(id) {
      var idx = state.workoutHistory.findIndex(function(w) { return w.id === id; });
      if (idx === -1) return;
      state.workoutHistory.splice(idx, 1);
      saveCache();
      document.querySelectorAll('.modal-overlay').forEach(function(m) { m.remove(); });
      renderStorico();
    }

    function groupByWeek(workouts) {
      var weeks = {};
      workouts.forEach(function(w) {
        var d = new Date(w.data);
        var startOfWeek = new Date(d);
        startOfWeek.setDate(d.getDate() - d.getDay() + 1);
        var weekKey = startOfWeek.toISOString().split('T')[0];

        if (!weeks[weekKey]) {
          weeks[weekKey] = { volume: 0, total: 0, completed: 0, days: [], label: '', workouts: [] };
          var weekDays = ['Lun', 'Mar', 'Mer', 'Gio', 'Ven', 'Sab', 'Dom'];
          for (var i = 0; i < 7; i++) {
            var day = new Date(startOfWeek);
            day.setDate(startOfWeek.getDate() + i);
            weeks[weekKey].days.push({ name: weekDays[i], date: day.toISOString().split('T')[0], done: false });
          }
          var month = startOfWeek.toLocaleDateString('it-IT', { month: 'short' });
          weeks[weekKey].label = startOfWeek.getDate() + ' ' + month;
        }

        var dayData = weeks[weekKey].days.find(function(d) { return d.date === w.data; });
        if (dayData) dayData.done = true;
        weeks[weekKey].completed++;
        weeks[weekKey].total = Math.min(5, 7);
        weeks[weekKey].workouts.push(w);
        var vol = 0;
        w.exercises.forEach(function(ex) {
          ex.sets.filter(function(s) { return s.completato; }).forEach(function(s) {
            vol += s.ripetizioni * s.peso_kg;
          });
        });
        weeks[weekKey].volume += vol;
      });
      return weeks;
    }

      html += '<button class="toggle-btn' + (state.fase === 1 ? ' active' : '') + '" onclick="setFase(1)">Fase 1</button>';
      html += '<button class="toggle-btn' + (state.fase === 2 ? ' active' : '') + '" onclick="setFase(2)">Fase 2</button>';
      html += '<button class="toggle-btn' + (state.fase === 3 ? ' active' : '') + '" onclick="setFase(3)">Fase 3</button>';
      html += '<button class="toggle-btn' + (state.fase === 'deload' ? ' active' : '') + '" onclick="setFase(\'deload\')">Deload</button>';
      html += '</div><p class="muted" style="font-size: 11px;">Fase 2: alzate laterali +1 serie | Fase 3: anche shrug +1 serie | Deload: -50% serie</p>';
      html += '<div class="divider mt-24"></div><h3>Dark mode</h3><div class="toggle-group mb-12">';
      html += '<button class="toggle-btn' + (state.darkMode === null ? ' active' : '') + '" onclick="setDarkMode(null)">Auto</button>';
      html += '<button class="toggle-btn' + (state.darkMode === true ? ' active' : '') + '" onclick="setDarkMode(true)">Scuro</button>';
      html += '<button class="toggle-btn' + (state.darkMode === false ? ' active' : '') + '" onclick="setDarkMode(false)">Chiaro</button>';
      html += '</div>';
      html += '<div class="divider mt-24"></div><h3>Dati</h3><button class="btn btn-block mt-8" onclick="exportData()">Esporta tutto (.json)</button><div class="mt-8"><input type="file" id="import-file" accept=".json" style="display: none;" onchange="importData(event)"><button class="btn btn-block" onclick="document.getElementById(\'import-file\').click()">Importa da file...</button></div><button class="btn btn-block mt-8 btn-danger" onclick="resetData()">Reset dati allenamenti</button></div>';
      view.innerHTML = html;
    }

    function setFase(fase) {
      state.fase = fase;
      saveCache();
      renderImpostazioni();
    }

    function setDarkMode(mode) {
      state.darkMode = mode;
      saveCache();
      applyDarkMode();
      renderImpostazioni();
    }

    function selectEditingDay(index) {
      state.editingDay = index;
      renderImpostazioni();
    }

    function updateExerciseParam(dayIndex, exIndex, param, value) {
      if (param === 'serie') state.templates[dayIndex].esercizi[exIndex].serie = parseInt(value);
      if (param === 'reps') state.templates[dayIndex].esercizi[exIndex].reps = value;
      if (param === 'recupero') state.templates[dayIndex].esercizi[exIndex].recupero = parseInt(value);
      saveCache();
    }

    function removeExercise(dayIndex, exIndex) {
      state.templates[dayIndex].esercizi.splice(exIndex, 1);
      saveCache();
      renderImpostazioni();
    }

    function moveExercise(dayIndex, exIndex, dir) {
      var arr = state.templates[dayIndex].esercizi;
      var target = exIndex + dir;
      if (target < 0 || target >= arr.length) return;
      var tmp = arr[exIndex];
      arr[exIndex] = arr[target];
      arr[target] = tmp;
      saveCache();
      renderImpostazioni();
    }

    function showAddExercise() {
      var overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.id = 'add-ex-modal';
      overlay.innerHTML = '<div class="modal-box"><h2>Nuovo esercizio</h2><label for="add-ex-name">Nome</label><input type="text" id="add-ex-name" placeholder="es. Panca piana" autofocus><label for="add-ex-sets">Serie</label><input type="number" id="add-ex-sets" value="3" min="1" max="10"><label for="add-ex-reps">Reps target</label><input type="text" id="add-ex-reps" value="8-12" placeholder="8-12"><label for="add-ex-rest">Recupero (min)</label><input type="number" id="add-ex-rest" value="1.5" min="0.5" max="5" step="0.5"><div class="modal-actions"><button class="btn btn-ghost" onclick="document.getElementById(\'add-ex-modal\').remove()">Annulla</button><button class="btn btn-primary" onclick="confirmAddExercise()">Aggiungi</button></div></div>';
      document.body.appendChild(overlay);
      setTimeout(function() { document.getElementById('add-ex-name').focus(); }, 100);
    }

    function confirmAddExercise() {
      var name = document.getElementById('add-ex-name').value.trim();
      if (!name) return;
      var sets = parseInt(document.getElementById('add-ex-sets').value) || 3;
      var reps = document.getElementById('add-ex-reps').value.trim() || '8-12';
      var rest = Math.round((parseFloat(document.getElementById('add-ex-rest').value) || 1.5) * 60);
      var editingDay = state.editingDay || 0;
      state.templates[editingDay].esercizi.push({ nome: name, serie: sets, reps: reps, recupero: rest, rpeTarget: '7.5-9' });
      saveCache();
      document.getElementById('add-ex-modal').remove();
      renderImpostazioni();
    }

    function exportData() {
      var data = {
        templates: state.templates,
        workoutHistory: state.workoutHistory,
        lastWeights: state.lastWeights,
        exportedAt: new Date().toISOString(),
      };
      var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'workout-backup-' + new Date().toISOString().split('T')[0] + '.json';
      a.click();
    }

    function importData(event) {
      var file = event.target.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function(e) {
        try {
          var data = JSON.parse(e.target.result);
          if (data.templates) state.templates = data.templates;
          if (data.workoutHistory) state.workoutHistory = data.workoutHistory;
          if (data.lastWeights) state.lastWeights = data.lastWeights;
          saveCache();
          renderImpostazioni();
          renderOggi();
        } catch(err) {
          alert('Errore importazione file.');
        }
      };
      reader.readAsText(file);
      event.target.value = '';
    }

    function resetData() {
      if (confirm('Cancellare tutti i dati degli allenamenti?')) {
        state.workoutHistory = [];
        state.lastWeights = {};
        saveCache();
        renderOggi();
        renderImpostazioni();
      }
    }

    async function syncWorkout(workout) {
      if (!supabaseClient) return;
      try {
        var result = await supabaseClient.from('workouts').insert({
          id: workout.id, giorno: workout.giorno, data: workout.data, durata_secondi: workout.durata_secondi, completato: workout.completato,
        }).select().single();
        if (result.error) throw result.error;
        for (var ei = 0; ei < workout.exercises.length; ei++) {
          var ex = workout.exercises[ei];
          var exResult = await supabaseClient.from('exercises').insert({
            workout_id: workout.id, nome_esercizio: ex.nome, ordine: ei,
          }).select().single();
          if (exResult.error) throw exResult.error;
          for (var si = 0; si < ex.sets.length; si++) {
            var s = ex.sets[si];
            var setResult = await supabaseClient.from('sets').insert({
              exercise_id: exResult.data.id, serie_numero: s.serie_numero, ripetizioni: s.ripetizioni, peso_kg: s.peso_kg, rir: s.rir, completato: s.completato,
            });
            if (setResult.error) throw setResult.error;
          }
        }
      } catch (e) {
        console.warn('Supabase sync failed, data saved locally:', e);
      }
    }

    async function loadWorkoutsFromSupabase() {
      if (!supabaseClient) return [];
      try {
        var result = await supabaseClient.from('workouts').select('*').order('data', { ascending: false });
        if (result.error) throw result.error;
        return result.data;
      } catch (e) {
        console.warn('Supabase load failed:', e);
        return [];
      }
    }

    renderOggi();
  </script>
</body>
</html>
